<script>
    // שנה כתובת זו לכתובת שקיבלת מ-Render
    const RENDER_URL = 'https://ai-chatbot-1-n63a.onrender.com';

    async function send() {
        const input = document.getElementById('userInput');
        const msgDiv = document.getElementById('messages');
        if(!input.value) return;

        msgDiv.innerHTML += `<div class="msg user">${input.value}</div>`;
        
        try {
            const res = await fetch(`${RENDER_URL}/chat`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: input.value})
            });
            const data = await res.json();
            msgDiv.innerHTML += `<div class="msg bot">${data.reply}</div>`;
        } catch(e) {
            msgDiv.innerHTML += `<div class="msg bot">שגיאה: לא מצליח לגשת לשרת הענן.</div>`;
        }
        
        input.value = '';
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }

    async function uploadImg() {
        try {
            const res = await fetch(`${RENDER_URL}/upload`, { method: 'POST' });
            const data = await res.json();
            alert(data.reply);
        } catch(e) {
            alert("שגיאה בתקשורת עם השרת.");
        }
    }
</script>
