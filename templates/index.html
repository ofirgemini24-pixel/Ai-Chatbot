<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AI Assistant Pro</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #ece5dd; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
        }
        #chat-container { 
            width: 450px; 
            height: 600px; 
            background: white; 
            border-radius: 15px; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
        }
        #messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            border-bottom: 1px solid #ddd; 
        }
        .msg { 
            margin-bottom: 15px; 
            padding: 10px; 
            border-radius: 10px; 
            max-width: 85%; 
        }
        .bot { 
            background: #f0f0f0; 
            align-self: flex-start; 
        }
        .user { 
            background: #dcf8c6; 
            margin-right: auto; 
        }
        .input-bar { 
            padding: 15px; 
            display: flex; 
            gap: 10px; 
            background: #f0f0f0; 
            border-bottom-left-radius: 15px; 
            border-bottom-right-radius: 15px; 
        }
        input { 
            flex: 1; 
            padding: 10px; 
            border: none; 
            border-radius: 20px; 
            outline: none; 
        }
        button { 
            background: #075e54; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 20px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

<div id="chat-container">
    <div style="background: #075e54; color: white; padding: 15px; text-align: center; border-top-left-radius: 15px; border-top-right-radius: 15px;">העוזר האישי שלי</div>
    <div id="messages" style="display: flex; flex-direction: column;"></div>
    <div class="input-bar">
        <button onclick="uploadImg()">📎</button>
        <input type="text" id="userInput" placeholder="שלח הודעה..." onkeypress="if(event.key === 'Enter') send()">
        <button onclick="send()">שלח</button>
    </div>
</div>

<script>
    // התיקון המרכזי: שימוש בנתיבים יחסיים של Render ללא הגדרת localhost קשיחה
    async function send() {
        const input = document.getElementById('userInput');
        const msgDiv = document.getElementById('messages');
        if(!input.value) return;

        // הוספת הודעת המשתמש למסך
        msgDiv.innerHTML += `<div class="msg user">${input.value}</div>`;
        const currentMessage = input.value;
        input.value = ''; // ניקוי מהיר של תיבת הטקסט
        msgDiv.scrollTop = msgDiv.scrollHeight;
        
        try {
            // שליחה לכתובת היחסית /chat של השרת
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: currentMessage })
            });
            
            if (!res.ok) {
                throw new Error("Server error");
            }

            const data = await res.json();
            msgDiv.innerHTML += `<div class="msg bot">${data.reply}</div>`;
        } catch (err) {
            msgDiv.innerHTML += `<div class="msg bot">⚠️ שגיאה בתקשורת עם השרת המרוחק. ודא שהשרת ב-Render פעיל.</div>`;
        }
        
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }

    async function uploadImg() {
        try {
            // שליחה לכתובת היחסית /upload של השרת
            const res = await fetch('/upload', { method: 'POST' });
            const data = await res.json();
            alert(data.reply);
        } catch (err) {
            alert("שגיאה בהעלאת תמונה לשרת.");
        }
    }
</script>
</body>
</html>
